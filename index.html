<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Webtrivo Technologies provides professional website development, mobile app development, CRM, ERP, e-commerce, and custom software solutions for businesses worldwide."
    />
    <meta property="og:title" content="Webtrivo Technologies | Website, App, CRM & ERP Development" />
    <meta
      property="og:description"
      content="Professional website development, mobile app development, CRM, ERP, e-commerce, and custom software solutions for international businesses."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webtrivotechnologies.github.io/" />
    <meta name="theme-color" content="#0b63f6" />
    <title>Webtrivo Technologies | Website, App, CRM & ERP Development</title>
    <script>
      (() => {
        const saved = localStorage.getItem("webtrivo-theme") || "system";
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = saved === "system" ? (prefersDark ? "dark" : "light") : saved;
        document.documentElement.dataset.themeChoice = saved;
        if (resolved === "dark") {
          document.documentElement.dataset.theme = "dark";
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/index.css" data-github-pages-fallback />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (
        location.hostname.endsWith("github.io") &&
        !document.querySelector('script[src="/assets/index.js"][crossorigin]')
      ) {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "/assets/index.js";
        document.head.appendChild(script);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
